name: Publish cloud-bridge image

on:
  push:
    branches: [cloud-print-test, main]
    paths:
      - Dockerfile.cloud-bridge
      - scripts/bambu_cloud_bridge.cpp
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(python3 -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.cloud-bridge
          platforms: linux/amd64
          push: true
          tags: |
            fabprint/fabprint-cloud-bridge:latest
            fabprint/fabprint-cloud-bridge:${{ steps.version.outputs.version }}
            fabprint/fabprint-cloud-bridge:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
