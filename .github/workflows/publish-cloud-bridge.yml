name: Publish packages and Docker images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # required for PyPI trusted publishing
      packages: write  # required for GHCR push
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GH_PAT }}

      - name: Bump patch version
        id: version
        run: |
          OLD=$(python3 -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          IFS='.' read -r maj min patch <<< "$OLD"
          NEW="$maj.$min.$((patch + 1))"
          sed -i "s/version = \"$OLD\"/version = \"$NEW\"/" pyproject.toml
          sed -i "s/__version__ = \"$OLD\"/__version__ = \"$NEW\"/" src/fabprint/__init__.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/fabprint/__init__.py
          git commit -m "Bump version to $NEW [skip ci]"
          git push
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Check if cloud-bridge Docker rebuild needed
        id: bridge_changed
        run: |
          git diff ${{ github.sha }}^1 ${{ github.sha }} --name-only \
            | grep -qE 'Dockerfile\.cloud-bridge|scripts/bambu_cloud_bridge\.cpp' \
            && echo "changed=true" >> "$GITHUB_OUTPUT" \
            || echo "changed=false" >> "$GITHUB_OUTPUT"

      - name: Check if OrcaSlicer Docker rebuild needed
        id: orca_changed
        run: |
          git diff ${{ github.sha }}^1 ${{ github.sha }} --name-only \
            | grep -qE '^Dockerfile$|^src/fabprint/|^pyproject\.toml$' \
            && echo "changed=true" >> "$GITHUB_OUTPUT" \
            || echo "changed=false" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build Python package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Log in to Docker Hub
        if: steps.bridge_changed.outputs.changed == 'true' || steps.orca_changed.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        if: steps.bridge_changed.outputs.changed == 'true' || steps.orca_changed.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.bridge_changed.outputs.changed == 'true' || steps.orca_changed.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3

      - name: Build and push cloud-bridge
        if: steps.bridge_changed.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.cloud-bridge
          platforms: linux/amd64
          push: true
          tags: |
            fabprint/cloud-bridge:latest
            fabprint/cloud-bridge:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}/cloud-bridge:latest
            ghcr.io/${{ github.repository }}/cloud-bridge:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push OrcaSlicer image
        if: steps.orca_changed.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            fabprint/fabprint:latest
            fabprint/fabprint:orca-2.3.1
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:orca-2.3.1
          build-args: ORCA_VERSION=2.3.1
          cache-from: type=gha
          cache-to: type=gha,mode=max
