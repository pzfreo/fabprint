name: "Fabprint Slice"
description: "Slice 3D models with OrcaSlicer and post build metrics to your PR"
branding:
  icon: "box"
  color: "blue"

inputs:
  config:
    description: "Path to fabprint.toml (relative to repo root)"
    required: false
    default: "fabprint.toml"
  orca-version:
    description: "OrcaSlicer version to use"
    required: false
    default: "2.3.1"
  until:
    description: "Run pipeline up to this stage (default: slice)"
    required: false
    default: "slice"
  output-dir:
    description: "Output directory for sliced files (relative to repo root)"
    required: false
    default: "fabprint_output"
  comment:
    description: "Post a PR comment with build metrics (true/false)"
    required: false
    default: "true"

outputs:
  print-time:
    description: "Estimated print time (human-readable)"
    value: ${{ steps.metrics.outputs.print-time }}
  filament-grams:
    description: "Total filament usage in grams"
    value: ${{ steps.metrics.outputs.filament-grams }}
  gcode-path:
    description: "Path to sliced gcode output directory"
    value: ${{ steps.metrics.outputs.gcode-path }}

runs:
  using: "composite"
  steps:
    - name: Pull fabprint image
      shell: bash
      env:
        ORCA_VERSION: ${{ inputs.orca-version }}
      run: |
        IMAGE="ghcr.io/pzfreo/fabprint:orca-${ORCA_VERSION}"
        echo "::group::Pulling ${IMAGE}"
        docker pull "${IMAGE}"
        echo "::endgroup::"

    - name: Run fabprint pipeline
      shell: bash
      env:
        ORCA_VERSION: ${{ inputs.orca-version }}
        CONFIG: ${{ inputs.config }}
        UNTIL: ${{ inputs.until }}
        OUTPUT_DIR: ${{ inputs.output-dir }}
        WORKSPACE: ${{ github.workspace }}
      run: |
        docker run --rm \
          -v "${WORKSPACE}:/project" \
          --workdir /project \
          "ghcr.io/pzfreo/fabprint:orca-${ORCA_VERSION}" \
          run "${CONFIG}" \
          --until "${UNTIL}" \
          --output-dir "/project/${OUTPUT_DIR}" \
          --local \
          -v \
          2>&1 | tee /tmp/fabprint-output.log

        # Docker creates files as root — fix ownership so later steps can read them
        sudo chown -R "$(id -u):$(id -g)" "${WORKSPACE}/${OUTPUT_DIR}" 2>/dev/null || true

    - name: Extract build metrics
      id: metrics
      shell: bash
      env:
        OUTPUT_DIR: ${{ inputs.output-dir }}
        CONFIG: ${{ inputs.config }}
        WORKSPACE: ${{ github.workspace }}
      run: |
        FULL_OUTPUT_DIR="${WORKSPACE}/${OUTPUT_DIR}"

        # Parse metrics from fabprint log output
        # gcode_stats is included in the slice stage, output format:
        #   "  123.4g filament, estimated 1h 7m 32s"
        PRINT_TIME=$(grep -oE 'estimated .+' /tmp/fabprint-output.log 2>/dev/null | head -1 | sed 's/estimated //' || true)
        FILAMENT=$(grep -oE '[0-9.]+g filament' /tmp/fabprint-output.log 2>/dev/null | head -1 | sed 's/g filament//' || true)

        # Extract project name: match top-level name only (before any [section] header)
        PROJECT_NAME=$(sed -n '/^\[/q; s/^name\s*=\s*"\(.*\)"/\1/p' "${WORKSPACE}/${CONFIG}" 2>/dev/null || true)

        echo "print-time=${PRINT_TIME}" >> "$GITHUB_OUTPUT"
        echo "filament-grams=${FILAMENT}" >> "$GITHUB_OUTPUT"
        echo "gcode-path=${FULL_OUTPUT_DIR}" >> "$GITHUB_OUTPUT"
        echo "project-name=${PROJECT_NAME}" >> "$GITHUB_OUTPUT"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: fabprint-${{ steps.metrics.outputs.project-name || 'output' }}
        path: ${{ inputs.output-dir }}/
        if-no-files-found: warn

    - name: Post PR comment
      if: ${{ inputs.comment == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      env:
        PRINT_TIME: ${{ steps.metrics.outputs.print-time }}
        FILAMENT_GRAMS: ${{ steps.metrics.outputs.filament-grams }}
        ORCA_VERSION: ${{ inputs.orca-version }}
        PROJECT_NAME: ${{ steps.metrics.outputs.project-name }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      with:
        script: |
          const printTime = process.env.PRINT_TIME || 'unknown';
          const filament = process.env.FILAMENT_GRAMS || 'unknown';
          const orcaVersion = process.env.ORCA_VERSION || 'unknown';
          const projectName = process.env.PROJECT_NAME || '';
          const runUrl = process.env.RUN_URL;
          const artifactName = `fabprint-${projectName || 'output'}`;
          const title = projectName ? `Fabprint: ${projectName}` : 'Fabprint Slice Results';
          const marker = `<!-- fabprint-slice-result-${projectName || 'default'} -->`;

          const body = [
            marker,
            `### ${title}`,
            '',
            '| Metric | Value |',
            '|--------|-------|',
            `| Print time | ${printTime} |`,
            `| Filament | ${filament}g |`,
            '',
            `Sliced with OrcaSlicer ${orcaVersion}`,
            '',
            `> 📦 [Download **${artifactName}**](${runUrl}#artifacts)`,
          ].join('\n');

          // Find existing comment to update
          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });
          const existing = comments.find(c => c.body.includes(marker));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
          }
